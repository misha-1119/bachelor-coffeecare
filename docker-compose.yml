services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      DISABLE_LLAMA: "1"
    volumes:
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
